<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Overview Capture Registry — Machine-Mediated Reception Studies</title>
<style>
:root { --bg: #0a0a0a; --fg: #e0ddd5; --accent: #c23b22; --accent2: #d4a537; --dim: #666; --border: #222; --hover: #151515; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'IBM Plex Mono', 'Courier New', monospace; background: var(--bg); color: var(--fg); line-height: 1.5; }
.c { max-width: 1100px; margin: 0 auto; padding: 20px; }
.nav { margin-bottom: 20px; font-size: 0.8em; }
.nav a { color: var(--accent2); text-decoration: none; margin-right: 15px; }
h1 { font-size: 1.3em; color: var(--accent); margin-bottom: 4px; letter-spacing: 0.05em; }
.sub { color: var(--dim); font-size: 0.82em; margin-bottom: 20px; }
.stats { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; font-size: 0.78em; }
.stat { border: 1px solid var(--border); padding: 6px 12px; }
.stat-l { color: var(--dim); font-size: 0.72em; text-transform: uppercase; }
.stat-v { font-size: 1.2em; color: var(--accent2); }
.ctl { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
.ctl input, .ctl select { background: #111; color: var(--fg); border: 1px solid var(--border); padding: 5px 8px; font-family: inherit; font-size: 0.78em; }
.ctl input { flex: 1; min-width: 180px; }
.fc { color: var(--dim); font-size: 0.72em; align-self: center; }
.card { border: 1px solid var(--border); margin-bottom: 12px; padding: 12px; }
.card:hover { border-color: var(--accent); }
.card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.card-q { color: var(--accent2); font-weight: bold; font-size: 0.9em; }
.card-meta { color: var(--dim); font-size: 0.7em; }
.card-cat { font-size: 0.68em; color: var(--dim); border: 1px solid var(--border); padding: 1px 5px; border-radius: 2px; margin-right: 6px; }
.card-mt { font-size: 0.68em; color: var(--tested, #2a7a3a); }
.card-desc { font-size: 0.78em; color: var(--fg); margin: 6px 0; }
.card-imgs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.card-imgs img { max-width: 200px; max-height: 300px; border: 1px solid var(--border); cursor: pointer; opacity: 0.85; }
.card-imgs img:hover { opacity: 1; border-color: var(--accent); }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
.modal.active { display: flex; }
.modal img { max-width: 95vw; max-height: 95vh; }
a { color: var(--accent2); text-decoration: none; }
</style>
</head>
<body>
<div class="c">
<div class="nav"><a href="/">← machinemediation.org</a> <a href="/captures/">Captures</a> <a href="/terms/">Terms</a></div>
<h1>AI OVERVIEW CAPTURE REGISTRY</h1>
<div class="sub">EA-WG-CAPTURES-01 · Longitudinal captures of composition-layer behavior · <a href="https://doi.org/10.5281/zenodo.20707509">DOI</a></div>
<div class="stats" id="stats"></div>
<div class="ctl">
<input type="text" id="search" placeholder="Search queries or descriptions...">
<select id="catF"><option value="">All categories</option></select>
<select id="mtF"><option value="">All match types</option><option value="EXACT MATCH">Exact</option><option value="BROAD MATCH">Broad</option></select>
<span class="fc" id="fc"></span>
</div>
<div id="cards"></div>
</div>
<div class="modal" id="modal" onclick="this.classList.remove('active')"><img id="modalImg"></div>
<script>
const IMG_BASE = 'https://godkinggoogle.vercel.app/captures/';
let D;
async function init() {
  const r = await fetch('/data/registry.json');
  D = await r.json();
  const cats = [...new Set(D.entries.map(e => e.s))].sort();
  const catF = document.getElementById('catF');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catF.appendChild(o); });
  document.getElementById('stats').innerHTML = `<div class="stat"><div class="stat-l">Captures</div><div class="stat-v">${D.total_captures}</div></div><div class="stat"><div class="stat-l">Version</div><div class="stat-v">${D.version}</div></div><div class="stat"><div class="stat-l">Date</div><div class="stat-v">${D.date}</div></div>`;
  ren();
  ['search'].forEach(id => document.getElementById(id).addEventListener('input', ren));
  ['catF', 'mtF'].forEach(id => document.getElementById(id).addEventListener('change', ren));
}
function ren() {
  const s = document.getElementById('search').value.toLowerCase();
  const cf = document.getElementById('catF').value;
  const mf = document.getElementById('mtF').value;
  let entries = D.entries.filter(e => {
    if (s && !e.q.toLowerCase().includes(s) && !(e.d||'').toLowerCase().includes(s)) return false;
    if (cf && e.s !== cf) return false;
    if (mf && e.mt !== mf) return false;
    return true;
  });
  document.getElementById('fc').textContent = `${entries.length} of ${D.total_captures}`;
  document.getElementById('cards').innerHTML = entries.map(e => `
    <div class="card">
      <div class="card-head">
        <span class="card-q">${esc(e.q)}</span>
        <span class="card-meta">${e.date || ''}</span>
      </div>
      <div><span class="card-cat">${e.s}</span>${e.mt ? `<span class="card-mt">${e.mt}</span>` : ''} <span style="color:var(--dim);font-size:0.68em">${e.sf || ''}</span></div>
      <div class="card-desc">${esc(e.d || '')}</div>
      ${(e.imgs || []).length ? `<div class="card-imgs">${e.imgs.map(img => { const s = typeof img === "string" ? img : img.src; const a = typeof img === "string" ? img : (img.label||img.src); return `<img src="${IMG_BASE}${s}" alt="${a}" title="${a}" onclick="event.stopPropagation();document.getElementById('modalImg').src=this.src;document.getElementById('modal').classList.add('active');" loading="lazy" onerror="this.style.display='none'">`; }).join('')}</div>` : ''}
    </div>
  `).join('');
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
init();
</script>
</body>
</html>
